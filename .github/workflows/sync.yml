name: Upstream Sync

permissions:
  contents: write # Write permission is required to merge code

on:
  schedule:
    - cron: "0 0 * * *" # Daily at UTC 00:00 (Beijing time 08:00) to check for updates
  workflow_dispatch: # Allow users to trigger manually

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.repository.fork }} # Only runs on forked repositories

    steps:
      - name: Random delay to spread scheduled runs
        if: github.event_name == 'schedule'
        run: |
          DELAY=$(shuf -i 0-3599 -n 1)
          echo "Sleeping ${DELAY}s (≈$((DELAY/60))min) to stagger fork runs over 1 hour …"
          sleep $DELAY

      # 1. Check out the user's repository
      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. Configure the merge=ours driver from .gitattributes to protect user runtime files
      - name: Configure protected merge driver
        run: |
          git config --global merge.ours.driver true

      # 3. Run the sync Action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          # 👇 [IMPORTANT] Hard-coded upstream repository address (Developer's Repo)
          upstream_sync_repo: ziwenhahaha/daily-paper-reader
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # Auto-generated, no user configuration needed
          
          # 👇 [KEY SETTING] Set to 'false' to perform a Git Merge rather than overwrite
          # The default behavior is already merge, but to be safe do not enable 'hard_reset' options
          test_mode: false

      # 4. If sync fails (e.g. due to conflicts), print an error
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] Automatic sync failed! This may be caused by conflicts from local source code changes."
          echo "Please go to the GitHub page and resolve the conflicts manually."
          exit 1
